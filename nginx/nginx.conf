##############################################################
# SEO OS — NGINX Main Configuration
# Subdomains:
#   admin.telzonmarketing.in       → Frontend (Next.js :3000)
#   api.telzonmarketing.in         → Backend API (FastAPI :8000)
#   missioncontrol.telzonmarketing.in → Mission Control (Next.js :3000/missioncontrol)
#   dev.telzonmarketing.in         → Dev environment (:3001)
#   staging.telzonmarketing.in     → Staging environment (:3002)
##############################################################

user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    server_tokens off;

    # ── Rate Limiting ─────────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

    # ── Upstream Backends ─────────────────────────────────────────────────────
    upstream seoos_api {
        server 127.0.0.1:8000;
        keepalive 32;
    }

    upstream seoos_frontend {
        server 127.0.0.1:3000;
        keepalive 16;
    }

    upstream seoos_dev {
        server 127.0.0.1:3001;
    }

    upstream seoos_staging {
        server 127.0.0.1:3002;
    }

    # ── Include site configs ──────────────────────────────────────────────────
    include /etc/nginx/sites-enabled/*.conf;
}
