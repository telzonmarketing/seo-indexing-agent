##############################################################
# admin.telzonmarketing.in
# → SEO OS Frontend (Next.js)
# → Agency admin interface — all 16 pages
##############################################################

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name admin.telzonmarketing.in;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl http2;
    server_name admin.telzonmarketing.in;

    # SSL (managed by Certbot / Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/admin.telzonmarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.telzonmarketing.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # Next.js frontend
    location / {
        proxy_pass http://seoos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # API proxy — /api/* forwarded to backend
    # Allows frontend to call /api/* without CORS issues
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://seoos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Next.js static assets
    location /_next/static/ {
        proxy_pass http://seoos_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Logs
    access_log /var/log/nginx/admin.access.log main;
    error_log  /var/log/nginx/admin.error.log;
}
