##############################################################
# dev.telzonmarketing.in
# → Development environment (Next.js hot-reload :3001)
# → Restricted — internal use only
##############################################################

server {
    listen 80;
    server_name dev.telzonmarketing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.telzonmarketing.in;

    ssl_certificate /etc/letsencrypt/live/dev.telzonmarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.telzonmarketing.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # IP restriction — uncomment and set your office/VPN IP
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass http://seoos_dev;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8001;  # Dev backend on :8001
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    access_log /var/log/nginx/dev.access.log main;
    error_log  /var/log/nginx/dev.error.log;
}
