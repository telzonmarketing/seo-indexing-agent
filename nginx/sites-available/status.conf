##############################################################
# status.telzonmarketing.in
# → System health monitoring page
# → Proxies to /status route on the Next.js app
##############################################################

server {
    listen 80;
    server_name status.telzonmarketing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name status.telzonmarketing.in;

    ssl_certificate /etc/letsencrypt/live/status.telzonmarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/status.telzonmarketing.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Public status page — no auth required
    location / {
        rewrite ^/$ /status last;
        rewrite ^/(.+)$ /status/$1 last;
    }

    location /status {
        proxy_pass http://seoos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Health API — public endpoint for uptime monitors
    location /api/health/ {
        proxy_pass http://seoos_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 10s;
    }

    location /_next/static/ {
        proxy_pass http://seoos_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/status.access.log main;
    error_log  /var/log/nginx/status.error.log;
}
