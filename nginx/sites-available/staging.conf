##############################################################
# staging.telzonmarketing.in
# → Staging environment (:3002 frontend, :8002 backend)
# → Pre-production testing before pushing to admin
##############################################################

server {
    listen 80;
    server_name staging.telzonmarketing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.telzonmarketing.in;

    ssl_certificate /etc/letsencrypt/live/staging.telzonmarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.telzonmarketing.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    # Basic auth protection for staging
    # auth_basic "Staging — Authorized Access Only";
    # auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        proxy_pass http://seoos_staging;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8002;  # Staging backend on :8002
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    access_log /var/log/nginx/staging.access.log main;
    error_log  /var/log/nginx/staging.error.log;
}
