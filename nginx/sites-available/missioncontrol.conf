##############################################################
# missioncontrol.telzonmarketing.in
# → SEO OS Live War Room
# → Real-time AI activity, system health, crawl pressure
# → Routes to /missioncontrol page on the Next.js app
##############################################################

server {
    listen 80;
    server_name missioncontrol.telzonmarketing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name missioncontrol.telzonmarketing.in;

    ssl_certificate /etc/letsencrypt/live/missioncontrol.telzonmarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/missioncontrol.telzonmarketing.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    # Dark-screen war room — no iframe embedding from external sites
    add_header X-Frame-Options "SAMEORIGIN" always;

    # All requests → /missioncontrol path on Next.js
    # Rewrite: missioncontrol.telzonmarketing.in/ → :3000/missioncontrol
    location / {
        # Rewrite root and all sub-paths into /missioncontrol/*
        rewrite ^/$ /missioncontrol last;
        rewrite ^/(.+)$ /missioncontrol/$1 last;
    }

    location /missioncontrol {
        proxy_pass http://seoos_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Mission-Control "true";
        proxy_cache_bypass $http_upgrade;
        # Long timeout for SSE / live streaming
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    # API proxy for live data
    location /api/ {
        proxy_pass http://seoos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;  # Critical for SSE/streaming
    }

    # Static assets
    location /_next/static/ {
        proxy_pass http://seoos_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/missioncontrol.access.log main;
    error_log  /var/log/nginx/missioncontrol.error.log;
}
