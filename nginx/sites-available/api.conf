##############################################################
# api.telzonmarketing.in
# → SEO OS Backend API (FastAPI :8000)
# → Direct API access + Swagger docs
##############################################################

server {
    listen 80;
    server_name api.telzonmarketing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.telzonmarketing.in;

    ssl_certificate /etc/letsencrypt/live/api.telzonmarketing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.telzonmarketing.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # CORS for cross-origin requests from admin subdomain
    add_header Access-Control-Allow-Origin "https://admin.telzonmarketing.in" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Handle preflight
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Auth rate limit (login endpoint)
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://seoos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All API endpoints
    location / {
        limit_req zone=api burst=30 nodelay;
        proxy_pass http://seoos_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # FastAPI auto-docs (only from trusted IPs in prod)
    location ~ ^/(docs|redoc|openapi.json) {
        # Uncomment to restrict to VPN/office IP only:
        # allow 1.2.3.4;
        # deny all;
        proxy_pass http://seoos_api;
        proxy_set_header Host $host;
    }

    access_log /var/log/nginx/api.access.log main;
    error_log  /var/log/nginx/api.error.log;
}
