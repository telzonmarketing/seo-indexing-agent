version: "3.9"

# Production docker-compose for Hostinger VPS
# Differences from dev:
#   - No --reload on uvicorn
#   - Resource limits per service
#   - Ollama runs on HOST (not in container) — better performance
#   - Restart policies set
#   - Log rotation configured

services:
  # ── Database ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-seo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-seopass}
      POSTGRES_DB: ${POSTGRES_DB:-seoos}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-seo} -d ${POSTGRES_DB:-seoos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Redis ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # AOF persistence: survives restarts, saves every second
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Qdrant ────────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    expose:
      - "6333"
    volumes:
      - qdrant_data:/qdrant/storage
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Backend API ───────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"      # only localhost — Nginx proxies externally
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-seo}:${POSTGRES_PASSWORD:-seopass}@postgres:5432/${POSTGRES_DB:-seoos}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-seo}:${POSTGRES_PASSWORD:-seopass}@postgres:5432/${POSTGRES_DB:-seoos}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      QDRANT_HOST: qdrant
      OLLAMA_HOST: http://host.docker.internal:11434   # Ollama runs on host
      SEO_OS_DATA_DIR: /data/seo-os
    extra_hosts:
      - "host.docker.internal:host-gateway"            # required for Ollama on host
    volumes:
      - seoos_data:/data/seo-os
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 2
      --timeout-keep-alive 30
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Celery Worker ─────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-seo}:${POSTGRES_PASSWORD:-seopass}@postgres:5432/${POSTGRES_DB:-seoos}
      DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-seo}:${POSTGRES_PASSWORD:-seopass}@postgres:5432/${POSTGRES_DB:-seoos}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      QDRANT_HOST: qdrant
      OLLAMA_HOST: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - api
      - redis
      - postgres
    command: >
      celery -A app.tasks.celery_app.celery worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=100
      -Q celery,crawl,ai,brain,default
      --without-gossip
      --without-mingle
    mem_limit: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "5"

  # ── Celery Beat ───────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      - worker
    command: >
      celery -A app.tasks.celery_app.celery beat
      --loglevel=info
      --schedule /var/celery/celerybeat-schedule
    volumes:
      - celery_beat_data:/var/celery
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # ── Frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"      # only localhost — Nginx proxies externally
    environment:
      NEXT_PUBLIC_API_URL: ""       # empty → client uses relative /api (Nginx routes it)
      NEXT_INTERNAL_API_URL: "http://api:8000"  # SSR → Docker service name
      DISABLE_REWRITES: "1"         # Nginx handles /api/*, no Next.js rewrite needed
      NODE_ENV: production
    depends_on:
      - api
    mem_limit: 256m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── API resource limits ───────────────────────────────────────────
  # Applied inline above; declare mem_limit on api too
volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  celery_beat_data:      # persists beat schedule across restarts
  seoos_data:            # client files, reports, exports
